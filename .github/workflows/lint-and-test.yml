name: Run Tests, Lint, and Check Types
run-name: ${{github.event.pull_request.title}} (${{ github.event.pull_request.number }}) by @${{ github.triggering_actor }} (Attempt ${{ github.run_attempt }})

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'codefreeze-*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CODEOWNERS'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout and Setup Node
        uses: ./.github/actions/setup-node
      - name: Lint
        run: pnpm run --if-present lint:ci
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout and Setup Node
        uses: ./.github/actions/setup-node
      - name: Check Types
        run: pnpm run check
  check-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout and Setup Node
        uses: ./.github/actions/setup-node
      - name: Assert no Svelte a11y warnings
        run: pnpm run check:a11y
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout and Setup Node
        uses: ./.github/actions/setup-node
      - name: Run Unit Tests
        run: pnpm test
