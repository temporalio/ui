publicPath:
port: 8081
enableUi: true
cors:
  cookieInsecure: false
  allowOrigins:
    - "*"
  unsafeAllowAllOrigins: true
refreshInterval: 1m
defaultNamespace: default
showTemporalSystemNamespace: false
feedbackUrl:
navCollapsedByDefault: false
disableWriteActions: false
workflowTerminateDisabled: false
workflowCancelDisabled: false
workflowSignalDisabled: false
workflowUpdateDisabled: false
workflowResetDisabled: false
workflowPauseDisabled: false
batchActionsDisabled: false
startWorkflowDisabled: false
hideWorkflowQueryErrors: false
refreshWorkflowCountsDisabled: false
activityCommandsDisabled: false
auth:
  enabled: false
  redirectToProvider: false
  providers:
    - label: Auth0 oidc # for internal use; in future may expose as button text
      type: oidc # for futureproofing; only oidc is supported today
      providerUrl: https://myorg.us.auth0.com/
      issuerUrl: "" # needed if the Issuer Url and the Provider Url are different
      clientId: xxxxxxxxxxxxxxxxxxxx
      clientSecret: xxxxxxxxxxxxxxxxxxxx
      scopes:
        - openid
        - profile
        - email
      callbackUrl: http://localhost:8080/auth/sso/callback
      options: # added as URL query params when redirecting to auth provider
        audience: myorg-dev
        organization: org_xxxxxxxxxxxx
        invitation:
tls:
  caFile:
  certFile:
  keyFile:
  caData:
  certData:
  keyData:
  enableHostVerification: false
  serverName:
uiServerTLS:
  certFile:
  keyFile:
codec:
  endpoint:
  passAccessToken: false
  includeCredentials: false
  defaultErrorMessage:
  defaultErrorLink:
forwardHeaders: # can be used to pass additional HTTP headers from HTTP requests to Temporal gRPC backend
  - X-Forwarded-For
customUi:
    enabled: true
    iframeExtensions:
      - id: top-nav-status
        title: Notification Center
        slot: app.top-nav.actions.after
        src: /custom-ui-examples/top-nav.html
        allowedOrigin: self
        sizing:
          defaultWidth: 220
          minWidth: 220
          maxWidth: 220
          defaultHeight: 32
          minHeight: 32
          maxHeight: 32

      - id: workflow-header-summary
        title: PulseMeter metrics login
        slot: workflow.header.after-details
        src: /custom-ui-examples/workflow-header.html
        allowedOrigin: self
        routePatterns:
          - /namespaces/:namespace/workflows/:workflow/:run/*
        sizing:
          defaultWidth: 400
          defaultHeight: 140
          minHeight: 96
          maxHeight: 480
        permissions:
          - context:workflow

      - id: top-sub-nav
        title: Notification Center
        slot: app.top-nav.sub-nav
        src: /custom-ui-examples/top-sub-nav.html
        allowedOrigin: self
        sizing:
          defaultHeight: 32
          minHeight: 32
          maxHeight: 32