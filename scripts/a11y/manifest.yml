# Accessibility fix-doc manifest
#
# This file is the source of truth for the a11y PR triage system in
# temporalio/ui. It maps each audit fix-doc slug to the metadata needed to
# label PRs that close it.
#
# Scope: this manifest holds ui-main and universal entries only.
# cloud-ui-main entries live in the temporalio/cloud-ui repo's manifest.
# A temporalio/ui PR that references a cloud-ui-main slug will get an
# `a11y:broken-ref` label by design (the Action does not cross repos).
#
# Maintenance: this file is owned by the audit team. New entries should be
# authored by extending audit-team-private issues-by-complexity-prompt.md to
# emit entries in this format, then committing the YAML alongside any PR that
# references a new slug.
#
# Schema (validated by scripts/a11y/manifest.test.mjs):
#   - slug: string, unique, kebab-case. Convention: {SC}-{description}
#     SC: WCAG criterion, e.g. "1.4.13"
#     bucket: 1 | 2 | 3 | 4 | null  (null = audit team has not yet assigned)
#     severity: critical | serious | moderate | minor
#     scope: ui-main | universal
#     files-touched: optional, list of repo-relative file paths
#
# See https://temporalio.atlassian.net/browse/DT-4048 §3.2.
#
# Initial population (2026-05-27) extracted from the audit team's
# issues-by-complexity output (ui-main rows only). Severity values normalized
# to the four-level rubric (critical/serious/moderate/minor) per the audit
# skill; original variants collapsed to the closest canonical level.

