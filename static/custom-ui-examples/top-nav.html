<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      button {
        display: inline-flex;
        height: 32px;
        width: 220px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        color: #0f172a;
        font: inherit;
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
      }

      [data-theme='dark'] button {
        border-color: #475569;
        background: #1e293b;
        color: #f8fafc;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #10b981;
      }
    </style>
  </head>
  <body>
    <button type="button" id="status">
      <span class="dot" aria-hidden="true"></span>
      <span>Notification Center</span>
    </button>

    <script>
      const extensionId = 'top-nav-status';
      let hostOrigin = '*';

      const send = (message) => {
        window.parent.postMessage(
          {
            version: 1,
            extensionId,
            ...message,
          },
          hostOrigin,
        );
      };

      const resize = () => {
        send({
          type: 'temporal-extension/resize',
          width: 220,
          height: 32,
        });
      };

      window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || message.extensionId !== extensionId) return;

        hostOrigin = event.origin;

        if (message.type === 'temporal-ui/theme') {
          document.documentElement.dataset.theme = message.theme;
        }

        resize();
      });

      document.getElementById('status').addEventListener('click', () => {
        send({
          type: 'temporal-extension/resize',
          width: 220,
          height: 32,
        });
      });

      send({ type: 'temporal-extension/ready' });
      resize();
    </script>
  </body>
</html>
