<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        color: #0f172a;
      }

      [data-theme='dark'] body {
        color: #f8fafc;
      }

      section {
        box-sizing: border-box;
        min-height: 128px;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
      }

      [data-theme='dark'] section {
        border-color: #475569;
        background: #1e293b;
      }

      h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }

      p {
        margin: 0;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
        color: #64748b;
        font-size: 11px;
        font-weight: 500;
      }

      [data-theme='dark'] label {
        color: #cbd5e1;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        height: 30px;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        background: #f8fafc;
        color: #0f172a;
        font: inherit;
        font-size: 12px;
        outline: none;
        padding: 0 8px;
      }

      input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 2px rgb(79 70 229 / 0.18);
      }

      [data-theme='dark'] input {
        border-color: #475569;
        background: #0f172a;
        color: #f8fafc;
      }

      button {
        height: 30px;
        align-self: end;
        border: 1px solid #4f46e5;
        border-radius: 5px;
        background: #4f46e5;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        padding: 0 12px;
        white-space: nowrap;
      }

      button:focus-visible {
        outline: 2px solid rgb(79 70 229 / 0.35);
        outline-offset: 2px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 6px;
        background: #e0e7ff;
        color: #3730a3;
        font-size: 13px;
        font-weight: 700;
      }

      [data-theme='dark'] .mark {
        background: #312e81;
        color: #c7d2fe;
      }

      .title {
        min-width: 0;
      }

      .subtitle {
        margin-top: 2px;
        overflow: hidden;
        color: #64748b;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      [data-theme='dark'] .subtitle,
      [data-theme='dark'] .meta {
        color: #cbd5e1;
      }

      .pill {
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        color: #475569;
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
        padding: 5px 8px;
      }

      [data-theme='dark'] .pill {
        border-color: #475569;
        color: #e2e8f0;
      }

      form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
        gap: 8px;
        margin: 0;
        align-items: end;
      }

      .meta {
        margin-top: 9px;
        color: #64748b;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="header">
        <div class="brand">
          <div class="mark" aria-hidden="true">PM</div>
          <div class="title">
            <h2>PulseMeter Metrics</h2>
            <p class="subtitle">Sign in to view live workflow telemetry</p>
          </div>
        </div>
        <span class="pill">Customer extension</span>
      </div>

      <form id="login-form">
        <label>
          Workspace
          <input id="workspace" autocomplete="organization" value="canary" />
        </label>
        <label>
          Access token
          <input
            autocomplete="current-password"
            placeholder="pm_live_..."
            type="password"
          />
        </label>
        <button type="submit">Connect</button>
      </form>
      <p class="meta" id="workflow-context">
        Metrics context will sync after Temporal sends workflow details.
      </p>
    </section>

    <script>
      const extensionId = 'workflow-header-summary';
      let hostOrigin = '*';

      const send = (message) => {
        window.parent.postMessage(
          {
            version: 1,
            extensionId,
            ...message,
          },
          hostOrigin,
        );
      };

      const resize = () => {
        send({
          type: 'temporal-extension/resize',
          height: document.documentElement.scrollHeight,
        });
      };

      window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || message.extensionId !== extensionId) return;

        hostOrigin = event.origin;

        if (message.type === 'temporal-ui/theme') {
          document.documentElement.dataset.theme = message.theme;
        }

        if (message.type === 'temporal-ui/context') {
          const workflow = message.context.workflow || {};
          const namespace = message.context.namespace || 'default';
          document.getElementById('workspace').value = namespace;
          document.getElementById('workflow-context').textContent =
            `Prepared for ${workflow.workflowType || 'this workflow'} in ${namespace}.`;
        }

        resize();
      });

      document
        .getElementById('login-form')
        .addEventListener('submit', (event) => {
          event.preventDefault();
          const button =
            event.submitter || event.currentTarget.querySelector('button');
          button.textContent = 'Connecting';
          window.setTimeout(() => {
            button.textContent = 'Connect';
          }, 1200);
        });

      send({ type: 'temporal-extension/ready' });
      resize();
    </script>
  </body>
</html>
